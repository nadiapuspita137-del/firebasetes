<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayah kau Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Cinzel', serif; }
        body { background: #05040a; height:100vh; display:flex; align-items:center; justify-content:center; }

        /* LOGIN */
        #loginPage {
            background: linear-gradient(145deg, #1a1025, #0d0815);
            padding:40px 30px; border-radius:20px; width:100%; max-width:420px;
            text-align:center; 
            border:2px solid #d4af37;
            box-shadow: 0 0 30px rgba(212,175,55,0.2), inset 0 0 30px rgba(212,175,55,0.05);
            position:relative;
        }
        #loginPage::before {
            content:'⚜️';
            position:absolute; top:-20px; left:50%; transform:translateX(-50%);
            font-size:2.5rem; filter:drop-shadow(0 0 10px #d4af37);
        }
        #loginPage h1 { 
            font-family: 'Orbitron', sans-serif; 
            color:#d4af37; margin-bottom:5px; 
            text-shadow:0 0 15px rgba(212,175,55,0.3);
        }
        #loginPage p { color:#b8a9d4; margin-bottom:20px; font-size:0.85rem; }
        .input-group { text-align:left; margin-bottom:15px; }
        .input-group label { 
            color:#d4af37; font-weight:700; display:block; margin-bottom:4px; 
            font-size:0.75rem; letter-spacing:2px;
        }
        .input-group input {
            width:100%; padding:12px; background:#120c1a; border:1px solid #3d2b5a;
            border-radius:10px; color:#fff; font-size:0.95rem; transition:0.3s;
            font-family: 'Cinzel', serif;
        }
        .input-group input:focus { 
            border-color:#d4af37; outline:none; 
            box-shadow:0 0 15px rgba(212,175,55,0.2);
        }
        #loginBtn {
            width:100%; background:linear-gradient(45deg, #d4af37, #b8962f); color:#0a080e;
            border:none; padding:14px; border-radius:10px; font-weight:bold; font-size:1.1rem;
            cursor:pointer; margin-top:8px; transition:0.3s; font-family: 'Orbitron', sans-serif;
        }
        #loginBtn:hover { transform:scale(1.02); box-shadow:0 0 25px rgba(212,175,55,0.4); }
        #loginError { color:#ff5e5e; font-size:0.85rem; display:none; margin-top:8px; }

        /* CHAT APP */
        #chatApp { display:none; width:100%; max-width:480px; height:90vh; background:#08060c; border-radius:25px; overflow:hidden; flex-direction:column; box-shadow:0 0 60px rgba(0,255,255,0.1), 0 0 80px rgba(212,175,55,0.05); border:1px solid #3d2b5a; }

        /* HEADER */
        #chatHeader {
            background:linear-gradient(180deg, #1a1025, #0d0815); 
            padding:12px 16px; display:flex; justify-content:space-between; align-items:center;
            flex-wrap:wrap; gap:6px; border-bottom:2px solid #d4af37;
        }
        .header-left { display:flex; flex-direction:column; }
        .room-name { 
            font-family:'Orbitron', sans-serif; font-weight:bold; font-size:1rem; 
            color:#d4af37; text-shadow:0 0 10px rgba(212,175,55,0.2);
        }
        .room-status { font-size:0.7rem; opacity:0.8; display:flex; align-items:center; gap:6px; color:#b8a9d4; }
        .online-count { 
            background:rgba(212,175,55,0.15); padding:2px 12px; border-radius:20px; 
            font-size:0.75rem; border:1px solid #d4af37; color:#d4af37;
        }
        .header-right { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
        #clearAllBtn {
            background:linear-gradient(45deg, #5e1a1a, #8b1a1a); border:none; color:#ffd700;
            padding:4px 12px; border-radius:20px; font-size:0.7rem; cursor:pointer; 
            transition:0.3s; font-family:'Orbitron', sans-serif; border:1px solid #ff4444;
        }
        #clearAllBtn:hover { transform:scale(0.95); background:#a10000; box-shadow:0 0 20px rgba(255,0,0,0.3); }
        #logoutBtn { 
            background:rgba(255,255,255,0.05); border:1px solid #3d2b5a; color:#b8a9d4; 
            padding:4px 12px; border-radius:20px; cursor:pointer; font-size:0.7rem; 
            font-family:'Cinzel', serif;
        }
        #logoutBtn:hover { background:rgba(255,255,255,0.1); }

        /* MESSAGES AREA */
        #messagesArea {
            flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:6px;
            background:radial-gradient(circle at 20% 30%, #1a1025, #05040a);
            background-size:cover; position:relative;
        }
        #messagesArea::before {
            content:''; position:absolute; top:0; left:0; right:0; bottom:0;
            background-image: 
                linear-gradient(rgba(212,175,55,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212,175,55,0.03) 1px, transparent 1px);
            background-size:50px 50px; pointer-events:none;
        }
        #messagesArea::-webkit-scrollbar { width:5px; }
        #messagesArea::-webkit-scrollbar-track { background:#120c1a; }
        #messagesArea::-webkit-scrollbar-thumb { background:#d4af37; border-radius:10px; }

        /* BUBBLE */
        .bubble {
            max-width:85%; width:fit-content; padding:8px 12px 5px; border-radius:12px; 
            box-shadow:0 2px 8px rgba(0,0,0,0.5); animation:fade 0.2s; position:relative;
            backdrop-filter:blur(4px); border:1px solid rgba(212,175,55,0.15);
            background:rgba(30,20,40,0.6);
        }
        @keyframes fade { from{opacity:0;transform:scale(0.9) translateY(5px);} to{opacity:1;transform:scale(1) translateY(0);} }
        .bubble.self { 
            align-self:flex-end; background:rgba(0,255,255,0.08); 
            border:1px solid rgba(0,255,255,0.4); border-top-right-radius:4px;
            box-shadow:0 0 15px rgba(0,255,255,0.05);
        }
        .bubble.other { 
            align-self:flex-start; background:rgba(212,175,55,0.08); 
            border:1px solid rgba(212,175,55,0.3); border-top-left-radius:4px;
            box-shadow:0 0 15px rgba(212,175,55,0.05);
        }
        .bubble .sender { 
            font-size:0.7rem; font-weight:700; color:#d4af37; 
            letter-spacing:1px; margin-bottom:2px;
        }
        .bubble.self .sender { color:#00e5ff; }
        .bubble .text { font-size:0.95rem; color:#ede7f6; margin:2px 0; line-height:1.4; }
        .bubble .time { font-size:0.6rem; color:#7a6b8a; text-align:right; margin-top:2px; }

        /* HAPUS PER PESAN */
        .bubble.self .delete-btn {
            display:none; position:absolute; top:-6px; right:-6px; background:#d32f2f; 
            color:white; border:none; border-radius:50%; width:20px; height:20px; 
            font-size:0.6rem; cursor:pointer; box-shadow:0 0 15px rgba(255,0,0,0.3);
            border:1px solid #ff5555;
        }
        .bubble.self:hover .delete-btn { display:block; }

        /* FOTO - bisa diklik */
        .bubble img { 
            max-width:200px; max-height:200px; border-radius:8px; margin-top:4px; 
            display:block; border:1px solid rgba(212,175,55,0.2); cursor:pointer;
            transition:0.2s;
        }
        .bubble img:hover { filter:brightness(1.2); transform:scale(1.02); }

        /* SYSTEM & TYPING */
        .system-msg { 
            text-align:center; font-size:0.7rem; color:#8b7a9e; padding:4px 0; 
            font-style:italic; letter-spacing:0.5px;
        }
        #typingIndicator { 
            text-align:center; font-size:0.7rem; color:#00e5ff; font-style:italic; 
            padding:4px 0; display:none; text-shadow:0 0 10px rgba(0,229,255,0.2);
            animation:blinkTyping 1.2s infinite;
        }
        @keyframes blinkTyping {
            0%, 100% { opacity:1; }
            50% { opacity:0.3; }
        }

        /* INPUT PANEL */
        #inputPanel {
            background:#120c1a; padding:8px 10px; display:flex; align-items:center; gap:6px;
            border-top:2px solid #d4af37; position:relative;
        }
        #messageInput {
            flex:1; padding:10px 14px; border:1px solid #3d2b5a; border-radius:30px; 
            background:#08060c; color:#ede7f6; font-size:0.9rem; font-family:'Cinzel', serif;
        }
        #messageInput:focus { outline:none; border-color:#d4af37; box-shadow:0 0 15px rgba(212,175,55,0.1); }
        .tool-btn {
            background:transparent; border:1px solid #3d2b5a; font-size:1.3rem; cursor:pointer;
            border-radius:50%; width:38px; height:38px; display:flex; align-items:center; 
            justify-content:center; transition:0.3s; color:#d4af37;
        }
        .tool-btn:hover { background:rgba(212,175,55,0.1); border-color:#d4af37; transform:scale(1.05); }
        #sendBtn {
            background:linear-gradient(45deg, #d4af37, #b8962f); border:none; border-radius:50%;
            width:44px; height:44px; font-size:1.2rem; cursor:pointer; transition:0.3s; 
            color:#08060c; font-weight:bold; border:1px solid #d4af37;
        }
        #sendBtn:hover { transform:scale(1.05); box-shadow:0 0 20px rgba(212,175,55,0.3); }
        #fileInput { display:none; }

        /* EMOJI PICKER - CYBER MEDIEVAL */
        #emojiPicker {
            display:none; position:absolute; bottom:60px; left:10px;
            background:linear-gradient(145deg, #1a1025, #0d0815); border:1px solid #d4af37;
            border-radius:15px; box-shadow:0 0 40px rgba(0,0,0,0.8), inset 0 0 30px rgba(212,175,55,0.05);
            padding:10px; width:280px; max-height:220px; overflow-y:auto; z-index:100;
            display:flex; flex-wrap:wrap; gap:4px; justify-content:center;
        }
        #emojiPicker span {
            font-size:1.8rem; cursor:pointer; padding:4px; border-radius:8px; 
            transition:0.1s; line-height:1.2; background:rgba(255,255,255,0.03);
            border:1px solid transparent;
        }
        #emojiPicker span:hover {
            background:rgba(212,175,55,0.2); border-color:#d4af37;
            transform:scale(1.3); box-shadow:0 0 15px rgba(212,175,55,0.2);
        }
        #emojiPicker::-webkit-scrollbar { width:4px; }
        #emojiPicker::-webkit-scrollbar-thumb { background:#d4af37; border-radius:4px; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
    <h1>⚔️ Medieval Chat</h1>
    <p>Masukkan nama & kode room (Rahasia123)</p>
    <div class="input-group">
        <label>👤 Nama</label>
        <input type="text" id="inputName" placeholder="Contoh: Andi">
    </div>
    <div class="input-group">
        <label>🔑 Kode Room</label>
        <input type="password" id="inputRoomCode" placeholder="Kode rahasia">
    </div>
    <button id="loginBtn">🚀 Masuk</button>
    <div id="loginError">Kode room salah!</div>
</div>

<!-- CHAT APP -->
<div id="chatApp">
    <div id="chatHeader">
        <div class="header-left">
            <div class="room-name">📍 Room: <span id="roomNameDisplay">-</span></div>
            <div class="room-status">
                <span id="statusDisplay">● Online</span>
                <span class="online-count">👥 <span id="onlineCount">0</span> online</span>
            </div>
        </div>
        <div class="header-right">
            <button id="clearAllBtn">🗑️ Hapus Semua</button>
            <button id="logoutBtn">Keluar</button>
        </div>
    </div>

    <div id="messagesArea">
        <div id="typingIndicator">✏️ Seseorang sedang mengetik...</div>
    </div>

    <div id="inputPanel">
        <button class="tool-btn" id="emojiBtn" title="Emoji">😊</button>
        <button class="tool-btn" id="photoBtn" title="Kirim Foto">📷</button>
        <input type="file" id="fileInput" accept="image/*">
        <input type="text" id="messageInput" placeholder="Ketik pesan...">
        <button id="sendBtn">➤</button>
        <div id="emojiPicker"></div>
    </div>
</div>

<!-- FIREBASE SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
    // ==========================================================
    // 🔥 KONFIGURASI FIREBASE (SESUAIKAN DENGAN PROJECT KAMU)
    // ==========================================================
    const firebaseConfig = {
        apiKey: "AIzaSyCC6TM-byvbZs2IGPKVgENWIoXwohtjzk4",
        authDomain: "cobaduluaja-54cd0.firebaseapp.com",
        databaseURL: "https://chatroom-app-34746-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "cobaduluaja-54cd0",
        storageBucket: "cobaduluaja-54cd0.firebasestorage.app",
        messagingSenderId: "933990061547",
        appId: "1:933990061547:web:6da9d8ac071bf11513b5ae",
        measurementId: "G-0H75EVMMQE"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ==========================================================
    // 🎯 KODE ROOM (GANTI SESUKA ANDA)
    // ==========================================================
    const ROOM_CODE = "Rahasia123";

    // ==========================================================
    // 🔔 NOTIFIKASI SUARA (notif.mp3 harus ada di folder)
    // ==========================================================
    function playNotification() {
        try {
            const audio = new Audio('notif.mp3');
            audio.play().catch(() => {
                // fallback beep
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.frequency.value = 880; osc.type = 'sine';
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
                osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.15);
            });
        } catch(e) {}
    }

    // ==========================================================
    // 💾 GLOBAL VARIABLES
    // ==========================================================
    let currentUser = { name: '', roomId: '' };
    let messagesRef = null;
    let presenceRef = null;
    let typingRef = null;

    // DOM
    const loginPage = document.getElementById('loginPage');
    const chatApp = document.getElementById('chatApp');
    const inputName = document.getElementById('inputName');
    const inputRoomCode = document.getElementById('inputRoomCode');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');
    const logoutBtn = document.getElementById('logoutBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const roomNameDisplay = document.getElementById('roomNameDisplay');
    const messagesArea = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusDisplay = document.getElementById('statusDisplay');
    const onlineCount = document.getElementById('onlineCount');
    const typingIndicator = document.getElementById('typingIndicator');
    const photoBtn = document.getElementById('photoBtn');
    const fileInput = document.getElementById('fileInput');
    const emojiBtn = document.getElementById('emojiBtn');
    const emojiPicker = document.getElementById('emojiPicker');

    // ==========================================================
    // 🛡️ PROTECTION: DISABLE INSPECT + CTRL+U + F12
    // ==========================================================
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
        if ((e.ctrlKey && (e.key === 'u' || e.key === 'U')) ||
            (e.ctrlKey && e.shiftKey && (e.key === 'i' || e.key === 'I' || e.key === 'j' || e.key === 'J')) ||
            e.key === 'F12') {
            e.preventDefault();
        }
    });
    document.addEventListener('dragover', e => e.preventDefault());
    document.addEventListener('drop', e => e.preventDefault());

    // ==========================================================
    // 🔐 LOGIN
    // ==========================================================
    loginBtn.addEventListener('click', () => {
        const name = inputName.value.trim();
        const code = inputRoomCode.value.trim();
        if (!name || !code) {
            loginError.textContent = 'Nama dan kode wajib diisi!';
            loginError.style.display = 'block';
            return;
        }
        if (code !== ROOM_CODE) {
            loginError.textContent = 'Kode room salah!';
            loginError.style.display = 'block';
            return;
        }
        loginError.style.display = 'none';

        currentUser.name = name;
        currentUser.roomId = code;
        localStorage.setItem('chat_user', JSON.stringify(currentUser));

        loginPage.style.display = 'none';
        chatApp.style.display = 'flex';
        startChat();
    });

    // Auto login
    const saved = localStorage.getItem('chat_user');
    if (saved) {
        try {
            const parsed = JSON.parse(saved);
            if (parsed && parsed.roomId === ROOM_CODE) {
                currentUser = parsed;
                loginPage.style.display = 'none';
                chatApp.style.display = 'flex';
                startChat();
            } else localStorage.removeItem('chat_user');
        } catch(e) { localStorage.removeItem('chat_user'); }
    }

    // ==========================================================
    // 🚪 LOGOUT
    // ==========================================================
    logoutBtn.addEventListener('click', () => {
        if (presenceRef) presenceRef.remove();
        if (messagesRef) messagesRef.off();
        if (typingRef) typingRef.off();
        localStorage.removeItem('chat_user');
        chatApp.style.display = 'none';
        loginPage.style.display = 'block';
        messagesArea.innerHTML = `<div id="typingIndicator">✏️ Seseorang sedang mengetik...</div>`;
        statusDisplay.textContent = '● Terputus';
        onlineCount.textContent = '0';
    });

    // ==========================================================
    // 🗑️ HAPUS SEMUA PESAN (konfirmasi ganda)
    // ==========================================================
    clearAllBtn.addEventListener('click', () => {
        if (!confirm('⚠️ Hapus SEMUA pesan di room ini?')) return;
        if (!confirm('Yakin? Data akan hilang permanen!')) return;
        messagesRef.remove()
            .then(() => {
                messagesRef.push({
                    name: 'System',
                    text: `🧹 Semua pesan telah dihapus oleh ${currentUser.name}`,
                    timestamp: firebase.database.ServerValue.TIMESTAMP,
                    type: 'system'
                });
            })
            .catch(err => {
                alert('Gagal menghapus: ' + err.message);
            });
    });

    // ==========================================================
    // 😊 EMOJI PICKER (PILIHAN)
    // ==========================================================
    const emojiList = ['😊','😂','❤️','🔥','👍','🎉','💀','👀','🤣','😍','🥰','😎','🤯','🥺','🤔','🙏','🤝','💪','👏','🎊','💯','😭','😱','🤡','👻','✨','❤️‍🔥','💀','😈','👿','🤖','🎃','👽','🤗','🤩','🥳','🤪','🤫','🤭','🧐','🤨','😏','😌','😇','😺','😸','😻','😽','🙌','👋','🤚','🖐','✌','🤞','🤟','🤘','👌','🤏','🫶','💕','💗','💖','💘','💝','💞','💓'];
    emojiPicker.innerHTML = emojiList.map(emoji => `<span>${emoji}</span>`).join('');

    emojiBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        emojiPicker.style.display = emojiPicker.style.display === 'flex' ? 'none' : 'flex';
    });

    document.addEventListener('click', (e) => {
        if (!emojiPicker.contains(e.target) && e.target !== emojiBtn) {
            emojiPicker.style.display = 'none';
        }
    });

    emojiPicker.querySelectorAll('span').forEach(el => {
        el.addEventListener('click', () => {
            messageInput.value += el.textContent;
            messageInput.focus();
            emojiPicker.style.display = 'none';
        });
    });

    // ==========================================================
    // 💬 START CHAT
    // ==========================================================
    function startChat() {
        const roomNode = `rooms/${ROOM_CODE}`;
        messagesRef = db.ref(`${roomNode}/messages`);
        presenceRef = db.ref(`${roomNode}/presence/${currentUser.name}`);
        typingRef = db.ref(`${roomNode}/typing`);

        messagesArea.innerHTML = `<div id="typingIndicator">✏️ Seseorang sedang mengetik...</div>`;

        presenceRef.set(true);
        presenceRef.onDisconnect().remove();

        messagesRef.push({
            name: 'System',
            text: `🟢 ${currentUser.name} telah bergabung`,
            timestamp: firebase.database.ServerValue.TIMESTAMP,
            type: 'system'
        });

        messagesRef.orderByChild('timestamp').on('child_added', (snap) => {
            const data = snap.val();
            if (!data) return;
            const msgId = snap.key;
            if (document.querySelector(`[data-id="${msgId}"]`)) return;

            if (data.type === 'system') {
                const div = document.createElement('div');
                div.className = 'system-msg';
                div.setAttribute('data-id', msgId);
                div.textContent = data.text;
                messagesArea.appendChild(div);
                scrollToBottom();
                return;
            }

            const isSelf = (data.name === currentUser.name);
            const bubble = document.createElement('div');
            bubble.className = `bubble ${isSelf ? 'self' : 'other'}`;
            bubble.setAttribute('data-id', msgId);

            let content = `<div class="sender">${data.name}</div>`;
            if (data.type === 'image') {
                content += `<img src="${data.url}" alt="Foto" class="chat-image" data-imgurl="${data.url}">`;
            } else {
                content += `<div class="text">${data.text}</div>`;
            }
            content += `<div class="time">${formatTime(data.timestamp)}</div>`;

            if (isSelf) {
                content += `<button class="delete-btn" data-msgid="${msgId}">✕</button>`;
            }

            bubble.innerHTML = content;
            messagesArea.appendChild(bubble);
            scrollToBottom();

            // 📸 Klik foto -> buka di tab baru
            if (data.type === 'image') {
                const img = bubble.querySelector('.chat-image');
                if (img) {
                    img.addEventListener('click', function() {
                        window.open(this.dataset.imgurl, '_blank');
                    });
                }
            }

            if (isSelf) {
                const delBtn = bubble.querySelector('.delete-btn');
                if (delBtn) {
                    delBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (confirm('Hapus pesan ini?')) {
                            messagesRef.child(msgId).remove();
                        }
                    });
                }
            }

            if (!isSelf) playNotification();
        });

        messagesRef.on('child_removed', (snap) => {
            const el = document.querySelector(`[data-id="${snap.key}"]`);
            if (el) el.remove();
        });

        const onlineCountRef = db.ref(`${roomNode}/presence`);
        onlineCountRef.on('value', (snap) => {
            const val = snap.val();
            let count = val ? Object.keys(val).length : 0;
            onlineCount.textContent = count;
        });

        onlineCountRef.on('child_removed', (snap) => {
            const name = snap.key;
            if (name === currentUser.name) return;
            messagesRef.push({
                name: 'System',
                text: `🔴 ${name} telah keluar`,
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                type: 'system'
            });
        });

        // ✏️ TYPING INDICATOR REAL TIME (lebih cepat)
        typingRef.on('value', (snap) => {
            const data = snap.val();
            if (!data) {
                typingIndicator.style.display = 'none';
                return;
            }
            const typingUsers = Object.keys(data).filter(key => key !== currentUser.name);
            if (typingUsers.length > 0) {
                typingIndicator.textContent = `✏️ ${typingUsers.join(', ')} sedang mengetik...`;
                typingIndicator.style.display = 'block';
            } else {
                typingIndicator.style.display = 'none';
            }
        });

        // DETECT TYPING (langsung update ke database)
        let typingTimeout = null;
        messageInput.addEventListener('input', () => {
            const update = {};
            update[currentUser.name] = true;
            typingRef.update(update);

            clearTimeout(typingTimeout);
            // Lebih cepat hilang (1 detik) agar realtime
            typingTimeout = setTimeout(() => {
                const remove = {};
                remove[currentUser.name] = null;
                typingRef.update(remove);
            }, 1000);
        });

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;
            messagesRef.push({
                name: currentUser.name,
                text: text,
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                type: 'text'
            });
            messageInput.value = '';
            const remove = {};
            remove[currentUser.name] = null;
            typingRef.update(remove);
        }

        photoBtn.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            e.target.value = '';

            const reader = new FileReader();
            reader.onload = async (ev) => {
                const base64 = ev.target.result;
                // ✅ TIDAK ADA BATASAN UKURAN FOTO
                messagesRef.push({
                    name: currentUser.name,
                    type: 'image',
                    url: base64,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });
            };
            reader.readAsDataURL(file);
        });

        db.ref('.info/connected').on('value', (snap) => {
            if (snap.val() === true) {
                statusDisplay.textContent = '● Online';
                statusDisplay.style.color = '#00e5ff';
            } else {
                statusDisplay.textContent = '● Mengulang koneksi...';
                statusDisplay.style.color = '#ff5e5e';
            }
        });

        function scrollToBottom() {
            setTimeout(() => {
                messagesArea.scrollTop = messagesArea.scrollHeight;
            }, 50);
        }

        function formatTime(ts) {
            if (!ts) return 'sekarang';
            const d = new Date(ts);
            return d.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });
        }
    }

    // ==========================================================
    // ✅ DATABASE RULES (WAJIB DI SET DI CONSOLE)
    // ==========================================================
    /*
    {
      "rules": {
        "rooms": {
          "$roomId": {
            ".read": true,
            ".write": true
          }
        }
      }
    }
    */
</script>
</body>
