<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>⚡ Room Chat | Firebase Realtime</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Inter', 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Chat container utama */
        .chat-app {
            max-width: 850px;
            width: 100%;
            height: 90vh;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35), 0 4px 12px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(0px);
            transition: all 0.2s ease;
        }

        /* Header */
        .chat-header {
            background: #1e2b3c;
            color: white;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 12px;
            border-bottom: 2px solid #ffcf4a;
        }

        .chat-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-header h2::before {
            content: "💬";
            font-size: 1.4rem;
        }

        .user-info {
            background: #2e4155;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .user-info span {
            font-weight: 700;
            color: #ffdf8c;
            max-width: 140px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #changeNameBtn {
            background: #ffcf4a;
            border: none;
            color: #1e2b3c;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.2s;
        }

        #changeNameBtn:hover {
            background: #ffbb2e;
            transform: scale(0.96);
        }

        /* Area pesan (scroll) */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.2rem 1.2rem 0.8rem 1.2rem;
            background: #f9fafc;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        /* Bubbles chat */
        .message-bubble {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            width: fit-content;
            background: white;
            border-radius: 1.5rem;
            border-top-left-radius: 0.4rem;
            padding: 0.65rem 1rem;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            transition: 0.1s;
            animation: fadeSlideUp 0.2s ease;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Pesan dari user sendiri (opsional sedikit aksen) - tidak membedakan drastis, tapi ada gaya berbeda */
        .message-bubble.self {
            background: #dcf8e7;
            border-top-left-radius: 1rem;
            border-top-right-radius: 0.4rem;
            align-self: flex-end;
        }

        .message-name {
            font-weight: 700;
            font-size: 0.75rem;
            color: #2c6e9e;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .message-name span:first-child {
            background: #eef2ff;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
        }

        .message-text {
            font-size: 0.95rem;
            line-height: 1.4;
            word-break: break-word;
            color: #1f2a3a;
            margin: 4px 0 6px 0;
        }

        .message-time {
            font-size: 0.65rem;
            color: #7c8b9c;
            text-align: right;
            letter-spacing: 0.2px;
        }

        /* Input area */
        .input-panel {
            background: #ffffff;
            padding: 1rem 1.2rem 1.2rem;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            background: #f1f5f9;
            border-radius: 60px;
            padding: 4px 12px;
            align-items: center;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .input-wrapper:focus-within {
            background: white;
            border-color: #ffcf4a;
            box-shadow: 0 0 0 2px rgba(255, 207, 74, 0.3);
        }

        #messageInput {
            width: 100%;
            background: transparent;
            border: none;
            padding: 12px 8px;
            font-size: 0.95rem;
            outline: none;
            color: #1e293b;
        }

        #messageInput::placeholder {
            color: #94a3b8;
        }

        #sendBtn {
            background: #1e2b3c;
            border: none;
            color: white;
            padding: 0 1.6rem;
            height: 48px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        #sendBtn:hover {
            background: #2e4155;
            transform: scale(0.97);
        }

        /* status kecil */
        .connection-badge {
            font-size: 0.7rem;
            background: #cfdef3;
            display: inline-block;
            padding: 2px 8px;
            border-radius: 30px;
            margin-left: 8px;
            color: #1e2b3c;
        }

        /* scrollbar custom */
        .messages-area::-webkit-scrollbar {
            width: 6px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: #eef2ff;
            border-radius: 10px;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #b9c8e0;
            border-radius: 10px;
        }

        /* pesan kosong */
        .empty-chat {
            text-align: center;
            color: #8ba0bc;
            margin-top: 40px;
            font-size: 0.9rem;
        }

        @media (max-width: 550px) {
            .chat-app {
                height: 95vh;
                border-radius: 1.5rem;
            }
            .message-bubble {
                max-width: 92%;
            }
            .input-panel {
                padding: 0.8rem;
            }
            .user-info {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
<div class="chat-app">
    <div class="chat-header">
        <h2>Room Chat <span class="connection-badge" id="statusDot">● sinkron</span></h2>
        <div class="user-info">
            👤 Nama: <span id="displayName">Tamu</span>
            <button id="changeNameBtn" aria-label="ganti nama">✎ Ganti</button>
        </div>
    </div>

    <div class="messages-area" id="messagesArea">
        <div class="empty-chat" id="emptyChatPlaceholder">💡 Belum ada pesan. Jadilah yang pertama!</div>
    </div>

    <div class="input-panel">
        <div class="input-wrapper">
            <input type="text" id="messageInput" placeholder="Ketik pesan..." autocomplete="off" autofocus>
        </div>
        <button id="sendBtn">✈️ Kirim</button>
    </div>
</div>

<!-- Firebase SDK compat (v9 modular compat, gaya lama mudah) -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
    // ======================== 🔥 KONFIGURASI FIREBASE ========================
    // 🚨 WAJIB: GANTI DENGAN DATA PROJECT FIREBASE ANDA! 🚨
    // Cara dapatkan: masuk ke Firebase Console -> Project Settings -> General -> Your apps -> Firebase SDK snippet (pilih CDN)
    // Pastikan Realtime Database sudah diaktifkan (mode uji coba sementara: izinkan read/write)
    // Direkomendasikan aturan sementara untuk demo: { "rules": { ".read": true, ".write": true } }
  const firebaseConfig = {
    apiKey: "AIzaSyCC6TM-byvbZs2IGPKVgENWIoXwohtjzk4",       // Hapus satu tanda petik ("")
    authDomain: "cobaduluaja-54cd0.firebaseapp.com",
    databaseURL: "https://chatroom-app-34746-default-rtdb.asia-southeast1.firebasedatabase.app/",
    projectId: "cobaduluaja-54cd0",                          // Hapus satu tanda petik ("")
    storageBucket: "cobaduluaja-54cd0.firebasestorage.app",  // Hapus satu tanda petik ("")
    messagingSenderId: "933990061547",
    appId: "1:933990061547:web:6da9d8ac071bf11513b5ae",
    measurementId: "G-0H75EVMMQE"
};

    // Inisialisasi Firebase (hanya jika belum diinisialisasi)
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const database = firebase.database();
    // Referensi ke node 'messages' di Realtime Database
    const messagesRef = database.ref('messages');

    // ---------------------- DOM elements ----------------------
    const messagesContainer = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const displayNameSpan = document.getElementById('displayName');
    const changeNameBtn = document.getElementById('changeNameBtn');
    const emptyPlaceholder = document.getElementById('emptyChatPlaceholder');
    const statusDot = document.getElementById('statusDot');

    // ---------------------- Variabel lokal ----------------------
    let currentUserName = "";      // nama user dari localStorage
    let isListenerAttached = false;
    let lastMessageIdSet = new Set();   // opsional untuk menghindari duplikat (cadangan)
    
    // ---------------------- Helper: scroll ke bawah dengan smooth ----------------------
    function scrollToBottom() {
        setTimeout(() => {
            if (messagesContainer) {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
        }, 50);
    }

    // Menampilkan / menyembunyikan placeholder kosong
    function toggleEmptyPlaceholder() {
        const messagesCount = messagesContainer.querySelectorAll('.message-bubble:not(.system-message)').length;
        if (messagesCount === 0) {
            if (!emptyPlaceholder) return;
            emptyPlaceholder.style.display = 'block';
        } else {
            if (emptyPlaceholder) emptyPlaceholder.style.display = 'none';
        }
    }

    // Format waktu dari timestamp Firebase (dalam milidetik)
    function formatMessageTime(timestampMs) {
        if (!timestampMs || isNaN(timestampMs)) return "baru saja";
        const date = new Date(timestampMs);
        return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
    }

    // Membuat elemen pesan di DOM (bubble)
    function appendMessageToDOM(messageId, name, text, timestamp, isSelf = false) {
        // cegah duplikat berdasarkan id (key dari firebase)
        if (lastMessageIdSet.has(messageId)) return;
        lastMessageIdSet.add(messageId);
        
        // Hilangkan placeholder kosong jika ada
        if (emptyPlaceholder && emptyPlaceholder.style.display !== 'none') {
            emptyPlaceholder.style.display = 'none';
        }
        
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message-bubble');
        if (isSelf) messageDiv.classList.add('self');
        messageDiv.setAttribute('data-msg-id', messageId);
        
        // Bagian nama pengirim
        const nameSpan = document.createElement('div');
        nameSpan.className = 'message-name';
        // inisial atau nama
        const nameInner = document.createElement('span');
        nameInner.textContent = name.length > 22 ? name.substring(0, 20) + '..' : name;
        nameSpan.appendChild(nameInner);
        
        // teks pesan
        const textSpan = document.createElement('div');
        textSpan.className = 'message-text';
        textSpan.textContent = text;   // aman dari XSS
        
        // waktu
        const timeSpan = document.createElement('div');
        timeSpan.className = 'message-time';
        let timeLabel = "sekarang";
        if (timestamp && typeof timestamp === 'number') {
            timeLabel = formatMessageTime(timestamp);
        } else {
            timeLabel = "🕒";
        }
        timeSpan.textContent = timeLabel;
        
        messageDiv.appendChild(nameSpan);
        messageDiv.appendChild(textSpan);
        messageDiv.appendChild(timeSpan);
        
        messagesContainer.appendChild(messageDiv);
        // scroll ke bawah setiap pesan baru (agar user selalu melihat update)
        scrollToBottom();
        toggleEmptyPlaceholder();
    }
    
    // Membersihkan semua pesan dari area chat (digunakan saat reload listener atau reset)
    function clearMessagesDisplay() {
        // Hapus semua child kecuali placeholder
        const bubbles = messagesContainer.querySelectorAll('.message-bubble');
        bubbles.forEach(bubble => bubble.remove());
        lastMessageIdSet.clear();
        toggleEmptyPlaceholder();
    }
    
    // ================ Mendengarkan pesan dari Firebase ================
    // Menggunakan orderByChild('timestamp') untuk mendapatkan urutan ascending (tertua ke terbaru)
    // Semua pesan akan tampil realtime
    let messagesQuery = null;
    
    function startListeningMessages() {
        if (messagesQuery) {
            // Matikan listener lama sebelum membuat yang baru (mencegah multiple listener)
            messagesQuery.off();
        }
        // Kosongkan tampilan agar sinkron ulang dengan database
        clearMessagesDisplay();
        
        // Buat query: urutkan berdasarkan timestamp (naik) -> semua pesan dari awal
        messagesQuery = messagesRef.orderByChild('timestamp');
        
        // Event child_added: untuk setiap pesan (existing + new)
        messagesQuery.on('child_added', (snapshot) => {
            const message = snapshot.val();
            const msgId = snapshot.key;
            if (!message) return;
            
            const { name, text, timestamp } = message;
            if (!name || !text) return; // validasi minimal
            
            // Deteksi apakah pesan dikirim oleh user yang sedang login (untuk memberi gaya tambahan)
            const isSelf = (name === currentUserName);
            
            // Pastikan timestamp adalah number (jika server timestamp berupa number, jika masih null pakai Date.now)
            let timeValue = timestamp;
            if (!timeValue || typeof timeValue !== 'number') {
                timeValue = Date.now(); // fallback jika belum ada timestamp server
            }
            
            appendMessageToDOM(msgId, name, text, timeValue, isSelf);
        });
        
        // Optional: menangani error koneksi database (event 'error' tidak langsung di child_added, tapi kita cek koneksi)
        messagesRef.once('value', (snap) => {
            if (snap.numChildren() === 0) {
                // tidak ada pesan, placeholder sudah muncul via clearMessagesDisplay
                if (emptyPlaceholder) emptyPlaceholder.style.display = 'block';
            }
        }).catch(err => {
            console.warn("Database warning:", err);
            statusDot.innerText = "⚠️ offline";
            statusDot.style.background = "#ffd966";
        });
        
        // Update status dot hijau jika koneksi online
        if (database.ref('.info/connected')) {
            database.ref('.info/connected').on('value', (snap) => {
                if (snap.val() === true) {
                    statusDot.innerText = "● live";
                    statusDot.style.background = "#c0e0b0";
                } else {
                    statusDot.innerText = "⟳ reconnecting";
                    statusDot.style.background = "#ffb347";
                }
            });
        }
    }
    
    // ================ Kirim pesan ke Firebase ================
    async function sendMessage() {
        const messageText = messageInput.value.trim();
        if (messageText === "") {
            messageInput.style.border = "1px solid #ff9f6e";
            setTimeout(() => { messageInput.style.border = ""; }, 500);
            return;
        }
        if (!currentUserName || currentUserName === "") {
            // jika nama kosong, minta ulang
            askUserName();
            if (!currentUserName) return;
        }
        
        // Buat objek pesan
        const newMessage = {
            name: currentUserName,
            text: messageText,
            timestamp: firebase.database.ServerValue.TIMESTAMP  // server timestamp (akurat)
        };
        
        try {
            await messagesRef.push(newMessage);
            // clear input & fokus
            messageInput.value = "";
            messageInput.focus();
            // scroll akan otomatis karena listener child_added menambah bubble & scroll
        } catch (error) {
            console.error("Gagal mengirim pesan:", error);
            alert("⚠️ Gagal mengirim pesan. Periksa koneksi atau konfigurasi Firebase.");
            statusDot.innerText = "❌ error";
        }
    }
    
    // ================ Manajemen Nama Pengguna (LocalStorage) ================
    function askUserName() {
        let newName = prompt("✨ Masukkan nama Anda untuk bergabung di chat room:", currentUserName || "Pebisnis");
        if (newName && newName.trim() !== "") {
            newName = newName.trim().substring(0, 28); // batasi panjang nama
            currentUserName = newName;
            localStorage.setItem('chat_username', currentUserName);
            displayNameSpan.textContent = currentUserName;
        } else if (!newName && !currentUserName) {
            currentUserName = "Pengguna" + Math.floor(Math.random() * 1000);
            localStorage.setItem('chat_username', currentUserName);
            displayNameSpan.textContent = currentUserName;
        } else if (newName === "" && currentUserName) {
            // tidak mengganti nama
        } else {
            if (!currentUserName) {
                currentUserName = "Tamu" + Math.floor(Math.random() * 900);
                localStorage.setItem('chat_username', currentUserName);
                displayNameSpan.textContent = currentUserName;
            }
        }
        // Jika setelah prompt nama berubah, kita perlu refresh gaya 'self' pada pesan? 
        // Tidak perlu, pesan lama tetap menggunakan nama lama. Tapi pesan baru akan mendeteksi isSelf sesuai nama baru.
        // Dan kita bisa update listener? tidak perlu, cukup variabel currentUserName diperbarui.
    }
    
    function loadUserName() {
        const savedName = localStorage.getItem('chat_username');
        if (savedName && savedName.trim() !== "") {
            currentUserName = savedName.trim();
        } else {
            // nama default sementara, tapi akan minta juga jika user ingin
            currentUserName = "Tamu" + Math.floor(Math.random() * 999);
            localStorage.setItem('chat_username', currentUserName);
        }
        displayNameSpan.textContent = currentUserName;
    }
    
    // Tombol ganti nama
    function initChangeName() {
        changeNameBtn.addEventListener('click', () => {
            askUserName();
            // Tidak perlu restart listener, hanya nama untuk kiriman berikutnya berubah.
            // Tapi untuk menampilkan ulang bubble "self" hanya untuk pesan baru
            messageInput.focus();
        });
    }
    
    // ====================== Persiapan awal & event ======================
    function init() {
        loadUserName();
        initChangeName();
        
        // Pastikan placeholder terlihat saat kosong
        toggleEmptyPlaceholder();
        
        // Mulai mendengarkan pesan dari Firebase (otomatis render semua pesan)
        startListeningMessages();
        
        // Event pengiriman pesan
        sendBtn.addEventListener('click', (e) => {
            e.preventDefault();
            sendMessage();
        });
        
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });
        
        // Jika user mengklik area chat, fokus input
        messagesContainer.addEventListener('click', () => {
            messageInput.focus();
        });
        
        // Perbaiki status ketika database error (tampilkan peringatan di console)
        window.addEventListener('online', () => {
            statusDot.innerText = "● sinkron";
            statusDot.style.background = "#cfdef3";
        });
        window.addEventListener('offline', () => {
            statusDot.innerText = "📡 offline";
            statusDot.style.background = "#e2c5a0";
        });
    }
    
    // Jalankan saat DOM siap
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
    
    // (opsional) informasi bagi developer di console
    console.log("🚀 Chat room siap! Pastikan konfigurasi Firebase sudah benar & aturan database = read/write true sementara.");
</script>
</body>
</html>
