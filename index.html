<!DOCTYPE html>
<html>
<body>

<input id="pesan">
<button onclick="kirim()">
Kirim
</button>

<script type="module">

import { initializeApp } from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc
}
from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCC6TM-byvbZs2IGPKVgENWIoXwohtjzk4",
  authDomain: "cobaduluaja-54cd0.firebaseapp.com",
  projectId: "cobaduluaja-54cd0",
  storageBucket: "cobaduluaja-54cd0.firebasestorage.app",
  messagingSenderId: "933990061547",
  appId: "1:933990061547:web:6da9d8ac071bf11513b5ae",
   measurementId: "G-0H75EVMMQE"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.kirim = async () => {

  console.log("Tombol diklik");

  try {

    const pesan =
      document.getElementById("pesan").value;

    console.log("Isi pesan:", pesan);

    const hasil = await addDoc(
      collection(db, "chat"),
      {
        pesan: pesan,
        waktu: Date.now()
      }
    );

    console.log("Berhasil simpan", hasil.id);

    alert("Berhasil disimpan");

  } catch (err) {

    console.error("ERROR FIREBASE:", err);

    alert(err.message);

  }

};

</script>

</body>
</html>
