<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Simple Live Chat</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: system-ui, 'Segoe UI', Roboto, sans-serif; }
        body { background:#0b141a; height:100vh; display:flex; align-items:center; justify-content:center; }

        /* ----- LOGIN ----- */
        #loginPage {
            background: #fff;
            padding: 40px 30px;
            border-radius: 20px;
            width: 100%; max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        #loginPage h1 { font-size:1.8rem; color:#075e54; margin-bottom:5px; }
        #loginPage p { color:#666; margin-bottom:20px; font-size:0.9rem; }
        .input-group { text-align:left; margin-bottom:12px; }
        .input-group label { font-weight:600; font-size:0.85rem; display:block; margin-bottom:3px; }
        .input-group input {
            width:100%; padding:12px; border:2px solid #ddd; border-radius:10px; font-size:1rem;
        }
        .input-group input:focus { outline:none; border-color:#075e54; }
        #loginBtn {
            width:100%; background:#075e54; color:white; border:none; padding:14px; border-radius:10px;
            font-weight:bold; font-size:1.1rem; cursor:pointer; margin-top:10px;
        }
        #loginBtn:hover { background:#064a42; }
        #loginError { color:#d32f2f; font-size:0.85rem; margin-top:10px; display:none; }

        /* ----- CHAT APP ----- */
        #chatApp { display:none; width:100%; max-width:480px; height:90vh; background:#efeae2; border-radius:25px; overflow:hidden; flex-direction:column; box-shadow:0 0 40px rgba(0,0,0,0.3); }

        /* Header */
        #chatHeader {
            background:#075e54; color:white; padding:12px 16px; display:flex; align-items:center; justify-content:space-between;
        }
        #chatHeader .room-info { display:flex; flex-direction:column; }
        #chatHeader .room-name { font-weight:bold; font-size:1.1rem; }
        #chatHeader .room-status { font-size:0.7rem; opacity:0.8; }
        #logoutBtn { background:rgba(255,255,255,0.2); border:none; color:white; padding:5px 12px; border-radius:20px; cursor:pointer; font-size:0.8rem; }

        /* Messages Area */
        #messagesArea {
            flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:4px;
            background:url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png') repeat;
            background-size:cover;
        }

        /* Bubble Pesan */
        .bubble {
            max-width:85%; width:fit-content; padding:8px 12px; border-radius:10px; position:relative;
            word-wrap:break-word; box-shadow:0 1px 2px rgba(0,0,0,0.1); animation:fade 0.2s;
        }
        @keyframes fade { from {opacity:0; transform:scale(0.9);} to {opacity:1; transform:scale(1);} }
        .bubble.self { align-self:flex-end; background:#dcf8c6; border-top-right-radius:2px; }
        .bubble.other { align-self:flex-start; background:white; border-top-left-radius:2px; }
        .bubble .sender { font-size:0.7rem; font-weight:600; color:#075e54; }
        .bubble .text { font-size:0.95rem; color:#111; }
        .bubble .time { font-size:0.6rem; color:#888; text-align:right; margin-top:3px; }

        /* System Notification (join/leave/typing) */
        .system-msg {
            text-align:center; font-size:0.75rem; color:#888; padding:4px 0;
        }
        .typing-indicator {
            text-align:center; font-size:0.75rem; color:#075e54; font-style:italic; padding:4px 0; display:none;
        }

        /* Input Panel */
        #inputPanel {
            background:#f0f0f0; padding:8px 10px; display:flex; align-items:center; gap:8px;
        }
        #messageInput {
            flex:1; padding:10px 14px; border:none; border-radius:30px; background:white; font-size:0.95rem;
        }
        #messageInput:focus { outline:none; }
        #sendBtn {
            background:#075e54; color:white; border:none; border-radius:50%; width:45px; height:45px;
            font-size:1.2rem; cursor:pointer; transition:0.2s;
        }
        #sendBtn:hover { background:#064a42; }

        /* Scrollbar */
        #messagesArea::-webkit-scrollbar { width:5px; }
        #messagesArea::-webkit-scrollbar-track { background:#ddd; }
        #messagesArea::-webkit-scrollbar-thumb { background:#aaa; border-radius:10px; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
    <h1>💬 Live Chat</h1>
    <p>Masukkan nama & kode room.</p>
    <div class="input-group">
        <label>👤 Nama</label>
        <input type="text" id="inputName" placeholder="Contoh: Andi">
    </div>
    <div class="input-group">
        <label>🔑 Kode Room</label>
        <input type="password" id="inputRoomCode" placeholder="Kode rahasia">
    </div>
    <button id="loginBtn">🚀 Masuk</button>
    <div id="loginError">Kode room salah!</div>
</div>

<!-- CHAT -->
<div id="chatApp">
    <div id="chatHeader">
        <div class="room-info">
            <div class="room-name">📍 Room: <span id="roomNameDisplay">-</span></div>
            <div class="room-status" id="statusDisplay">● Tersambung</div>
        </div>
        <button id="logoutBtn">Keluar</button>
    </div>

    <div id="messagesArea">
        <div class="system-msg" id="typingIndicator">🧑‍💻 Seseorang sedang mengetik...</div>
    </div>

    <div id="inputPanel">
        <input type="text" id="messageInput" placeholder="Ketik pesan...">
        <button id="sendBtn">➤</button>
    </div>
</div>

<!-- FIREBASE SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
    // ==========================================================
    // 🔥 KONFIGURASI FIREBASE (sesuaikan dengan project kamu)
    // ==========================================================
    const firebaseConfig = {
        apiKey: "AIzaSyCC6TM-byvbZs2IGPKVgENWIoXwohtjzk4",
        authDomain: "cobaduluaja-54cd0.firebaseapp.com",
        databaseURL: "https://chatroom-app-34746-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "cobaduluaja-54cd0",
        storageBucket: "cobaduluaja-54cd0.firebasestorage.app",
        messagingSenderId: "933990061547",
        appId: "1:933990061547:web:6da9d8ac071bf11513b5ae",
        measurementId: "G-0H75EVMMQE"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ==========================================================
    // 🎯 KODE ROOM RAHASIA (ganti sesuai keinginan admin)
    // ==========================================================
    const ROOM_CODE = "MIMOME";   // <-- Ganti ini!

    // ==========================================================
    // 🎵 SUARA NOTIFIKASI
    // ==========================================================
    function playNotification() {
        // Jika file notif.mp3 ada di folder yang sama, gunakan itu
        const audio = new Audio('notif.mp3');
        audio.play().catch(() => {
            // Fallback: generate suara beep pakai Web Audio
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = 880;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.15);
            } catch(e) {}
        });
    }

    // ==========================================================
    // 💾 VARIABEL GLOBAL
    // ==========================================================
    let currentUser = { name: '', roomId: '' };
    let messagesRef = null;
    let presenceRef = null;
    let typingRef = null;

    // DOM elements
    const loginPage = document.getElementById('loginPage');
    const chatApp = document.getElementById('chatApp');
    const inputName = document.getElementById('inputName');
    const inputRoomCode = document.getElementById('inputRoomCode');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');
    const logoutBtn = document.getElementById('logoutBtn');
    const roomNameDisplay = document.getElementById('roomNameDisplay');
    const messagesArea = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusDisplay = document.getElementById('statusDisplay');
    const typingIndicator = document.getElementById('typingIndicator');

    // ==========================================================
    // 🔐 LOGIN
    // ==========================================================
    loginBtn.addEventListener('click', () => {
        const name = inputName.value.trim();
        const code = inputRoomCode.value.trim();
        if (!name || !code) {
            loginError.textContent = 'Nama & kode wajib diisi!';
            loginError.style.display = 'block';
            return;
        }
        if (code !== ROOM_CODE) {
            loginError.textContent = 'Kode room salah!';
            loginError.style.display = 'block';
            return;
        }
        loginError.style.display = 'none';

        currentUser.name = name;
        currentUser.roomId = code;
        roomNameDisplay.textContent = code;
        localStorage.setItem('chat_user', JSON.stringify(currentUser));

        loginPage.style.display = 'none';
        chatApp.style.display = 'flex';
        startChat();
    });

    // Auto-login jika sebelumnya sudah masuk
    const saved = localStorage.getItem('chat_user');
    if (saved) {
        try {
            const parsed = JSON.parse(saved);
            if (parsed && parsed.roomId === ROOM_CODE) {
                currentUser = parsed;
                roomNameDisplay.textContent = parsed.roomId;
                loginPage.style.display = 'none';
                chatApp.style.display = 'flex';
                startChat();
            } else localStorage.removeItem('chat_user');
        } catch(e) { localStorage.removeItem('chat_user'); }
    }

    // ==========================================================
    // 🚪 LOGOUT
    // ==========================================================
    logoutBtn.addEventListener('click', () => {
        // Hapus presence
        if (presenceRef) {
            presenceRef.remove();
            presenceRef.onDisconnect().cancel();
        }
        if (messagesRef) messagesRef.off();
        localStorage.removeItem('chat_user');
        chatApp.style.display = 'none';
        loginPage.style.display = 'block';
        inputName.value = '';
        inputRoomCode.value = '';
        messagesArea.innerHTML = `<div class="system-msg" id="typingIndicator">🧑‍💻 Seseorang sedang mengetik...</div>`;
        statusDisplay.textContent = '● Terputus';
    });

    // ==========================================================
    // 💬 START CHAT (LISTENER & PRESENCE)
    // ==========================================================
    function startChat() {
        const roomNode = `rooms/${ROOM_CODE}`;
        messagesRef = db.ref(`${roomNode}/messages`);
        presenceRef = db.ref(`${roomNode}/presence/${currentUser.name}`);
        typingRef = db.ref(`${roomNode}/typing`);

        // 1. Bersihkan area
        messagesArea.innerHTML = `<div class="system-msg" id="typingIndicator">🧑‍💻 Seseorang sedang mengetik...</div>`;

        // 2. Set presence user ONLINE
        presenceRef.set(true);
        // Saat disconnect (tutup tab/keluar), otomatis hapus presence
        presenceRef.onDisconnect().remove();

        // 3. Join notification
        // Kirim pesan sistem: user bergabung
        const joinMsg = {
            name: 'System',
            text: `🟢 ${currentUser.name} telah bergabung`,
            timestamp: firebase.database.ServerValue.TIMESTAMP,
            type: 'system'
        };
        messagesRef.push(joinMsg);

        // 4. Listener pesan baru
        messagesRef.orderByChild('timestamp').on('child_added', (snap) => {
            const data = snap.val();
            if (!data) return;
            const isSelf = (data.name === currentUser.name);
            const msgId = snap.key;
            if (document.querySelector(`[data-id="${msgId}"]`)) return;

            // System message
            if (data.type === 'system') {
                const div = document.createElement('div');
                div.className = 'system-msg';
                div.setAttribute('data-id', msgId);
                div.textContent = data.text;
                messagesArea.appendChild(div);
                scrollToBottom();
                return;
            }

            // Normal message bubble
            const bubble = document.createElement('div');
            bubble.className = `bubble ${isSelf ? 'self' : 'other'}`;
            bubble.setAttribute('data-id', msgId);
            bubble.innerHTML = `
                <div class="sender">${data.name}</div>
                <div class="text">${data.text}</div>
                <div class="time">${formatTime(data.timestamp)}</div>
            `;
            messagesArea.appendChild(bubble);
            scrollToBottom();

            // 🔔 Notifikasi suara (hanya jika pesan dari orang lain)
            if (!isSelf) {
                playNotification();
            }
        });

        // 5. Listener kehadiran (presence) - untuk keluar/masuk otomatis
        db.ref(`${roomNode}/presence`).on('value', (snap) => {
            // Tampilkan online count? Bisa ditambahkan nanti
        });

        // 6. Listener perubahan presence (join/leave manual)
        db.ref(`${roomNode}/presence`).on('child_removed', (snap) => {
            const name = snap.key;
            if (name === currentUser.name) return; // jangan notifikasi diri sendiri
            const leaveMsg = {
                name: 'System',
                text: `🔴 ${name} telah keluar`,
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                type: 'system'
            };
            messagesRef.push(leaveMsg);
        });

        // 7. Typing indicator
        typingRef.on('value', (snap) => {
            const data = snap.val();
            if (!data) {
                typingIndicator.style.display = 'none';
                return;
            }
            // Cek apakah ada orang lain yang mengetik (selain user sendiri)
            const typingUsers = Object.keys(data).filter(key => key !== currentUser.name);
            if (typingUsers.length > 0) {
                const names = typingUsers.map(u => u).join(', ');
                typingIndicator.textContent = `✏️ ${names} sedang mengetik...`;
                typingIndicator.style.display = 'block';
            } else {
                typingIndicator.style.display = 'none';
            }
        });

        // 8. Status koneksi
        db.ref('.info/connected').on('value', (snap) => {
            if (snap.val() === true) {
                statusDisplay.textContent = '● Online';
                statusDisplay.style.color = '#b1f0b1';
            } else {
                statusDisplay.textContent = '● Mengulang koneksi...';
                statusDisplay.style.color = '#ffb347';
            }
        });

        // 9. Event typing di input
        let typingTimeout = null;
        messageInput.addEventListener('input', () => {
            // Kirim status typing ke Firebase
            const update = {};
            update[currentUser.name] = true;
            typingRef.update(update);

            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                // Hapus status typing setelah 2 detik tidak mengetik
                const remove = {};
                remove[currentUser.name] = null;
                typingRef.update(remove);
            }, 2000);
        });

        // 10. Kirim pesan text
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;
            messagesRef.push({
                name: currentUser.name,
                text: text,
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                type: 'text'
            });
            messageInput.value = '';
            // Hapus status typing setelah kirim
            const remove = {};
            remove[currentUser.name] = null;
            typingRef.update(remove);
        }

        // 11. Scroll helper
        function scrollToBottom() {
            setTimeout(() => {
                messagesArea.scrollTop = messagesArea.scrollHeight;
            }, 50);
        }

        // 12. Format waktu
        function formatTime(ts) {
            if (!ts) return 'sekarang';
            const d = new Date(ts);
            return d.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });
        }
    }

</script>
</body>
</html>
